name: remote-train

on:
  workflow_dispatch:
    inputs:
      chunks:
        description: "Sequential chunks to train and upload, from 1 to 8"
        type: number
        required: true
        default: 6
      rounds_per_chunk:
        description: "Training rounds per chunk"
        type: number
        required: true
        default: 1
      episode_size:
        description: "Steps per round"
        type: number
        required: true
        default: 800
      batch_size:
        description: "Agents per batch request"
        type: number
        required: true
        default: 30
      exploration:
        description: "Initial epsilon"
        type: string
        required: true
        default: "0.6"
      seed:
        description: "Random seed"
        type: number
        required: true
        default: 42
      artifact_name:
        description: "Uploaded artifact name prefix"
        type: string
        required: true
        default: "trained-model"

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      MODEL_PATH: src/models/upmodel_compact.keras
      SDL_VIDEODRIVER: dummy
      TF_CPP_MIN_LOG_LEVEL: "2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show training configuration
        run: |
          python --version
          python - <<'PY'
          import os
          import sys
          sys.path.insert(0, "src")
          from config import SENSOR_COUNT, STATE_SIZE
          print(f"Model path: {os.environ['MODEL_PATH']}")
          print(f"Sensors: {SENSOR_COUNT}")
          print(f"State size: {STATE_SIZE}")
          PY

      - name: Train chunk 1
        if: ${{ inputs.chunks >= 1 }}
        shell: bash
        run: |
          python src/main.py --mode train --headless \
            --rounds ${{ inputs.rounds_per_chunk }} \
            --episode-size ${{ inputs.episode_size }} \
            --batch-size ${{ inputs.batch_size }} \
            --exploration ${{ inputs.exploration }} \
            --seed ${{ inputs.seed }} \
            --model-path "${MODEL_PATH}"

      - name: Upload checkpoint 1
        if: ${{ inputs.chunks >= 1 }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}-chunk-1-${{ github.run_id }}
          path: ${{ env.MODEL_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Train chunk 2
        if: ${{ inputs.chunks >= 2 }}
        shell: bash
        run: |
          python src/main.py --mode train --headless \
            --rounds ${{ inputs.rounds_per_chunk }} \
            --episode-size ${{ inputs.episode_size }} \
            --batch-size ${{ inputs.batch_size }} \
            --exploration ${{ inputs.exploration }} \
            --seed ${{ inputs.seed }} \
            --model-path "${MODEL_PATH}"

      - name: Upload checkpoint 2
        if: ${{ inputs.chunks >= 2 }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}-chunk-2-${{ github.run_id }}
          path: ${{ env.MODEL_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Train chunk 3
        if: ${{ inputs.chunks >= 3 }}
        shell: bash
